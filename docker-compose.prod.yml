name: school-booking-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: schoolapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: schoolapp_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}

  api:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://schoolapp:${POSTGRES_PASSWORD}@postgres:5432/schoolapp_prod
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OTP_JWT_SECRET: ${OTP_JWT_SECRET}
      OTP_JWT_EXPIRES_IN: 15m
      APP_BASE_URL: https://${DOMAIN}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      SMTP_HOST: smtp.resend.com
      SMTP_PORT: 465
      SMTP_USER: resend
      SMTP_PASS: ${RESEND_API_KEY}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./devops/nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./devops/certbot/conf:/etc/letsencrypt
      - ./devops/certbot/www:/var/www/certbot
    depends_on:
      - api
      - web

  certbot:
    image: certbot/certbot
    volumes:
      - ./devops/certbot/conf:/etc/letsencrypt
      - ./devops/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
